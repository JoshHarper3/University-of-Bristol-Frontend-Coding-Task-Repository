<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="styles.css">
  <script src="Score.JS"></script>

  
  <title>Frontend Mentor | Results summary component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <div class="card"> 

  <section class="result"> 
  <h2 class="your-result">Your Result</h2>
  <div class="result-circle">
  <span class="score"> 76 </span>
  <span class="percentage"> of 100 </span>
  </div>

  <h3 class="great-heading">Great</h3>
  <p class="score-breakdown">You scored higher than 65% of the people who have taken these tests.</p>
  </section>
  
  <section class="summary">
  <h2 class="summary-heading">Summary</h2>

  <div class="reaction-row">
  <div class="icon-and-text"><img src="assets/images/icon-reaction.svg" alt="Reaction Icon">
  <span class="reaction">Reaction</span>
  </div>
  <span class="score-value">-- / 100</span>
  </div>

  <div class="memory-row">
  <div class="icon-and-text"><img src="assets/images/icon-memory.svg" alt="Memory Icon">
  <span class="memory">Memory</span>
  </div>
  <span class="score-value">-- / 100</span>
  </div>

  <div class="verbal-row">
  <div class="icon-and-text">
  <img src="assets/images/icon-verbal.svg" alt="Verbal Icon">  
  <span class="verbal">Verbal</span>
  </div>
  <span class="score-value">-- / 100</span>
  </div>

  <div class="visual-row">
  <div class="icon-and-text">
  <img src="assets/images/icon-visual.svg" alt="Visual Icon"> 
  <span class="visual">Visual</span>
  </div>
  <span class="score-value">-- / 100</span>
  </div>

  <button class="Continue-Button">Continue</button>
  </section>
  </div>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="https://joshharper3.github.io/Portfolio-Website/">Joshua Harper</a>.
  </footer>
</body>
</html>
